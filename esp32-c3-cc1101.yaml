script:
  - id: transmit_aok
    parameters:
      cmd: int
      packet_id: int
      channel: int
    then:
      - lambda: 'id(is_transmitting) = true;'
      - lambda: |-
          // A-OK protokol: [Start 8b=0xA3][ID 24b][Address 16b][Command 8b][Checksum 8b]
          uint32_t remote_id = packet_id;
          uint16_t address = 1 << (channel - 1);  // Konverzia kanálu na bitové pole
          uint8_t command = cmd;
          
          // Výpočet checksum
          uint8_t checksum = ((remote_id >> 16) & 0xFF) + ((remote_id >> 8) & 0xFF) + (remote_id & 0xFF);
          checksum += ((address >> 8) & 0xFF) + (address & 0xFF);
          checksum += command;
          
          // Zostav 64-bitový paket
          uint64_t packet = 0xA3;
          packet = (packet << 24) | (remote_id & 0xFFFFFF);
          packet = (packet << 16) | (address & 0xFFFF);
          packet = (packet << 8) | command;
          packet = (packet << 8) | checksum;
          
          ESP_LOGI("A-OK_TX", "Sending A-OK: ID=0x%06X, CH=%d, CMD=0x%02X (%s), CHK=0x%02X",
                   remote_id, channel, command,
                   (command == 0x0B ? "UP" : 
                    command == 0x43 ? "DOWN" : 
                    command == 0x23 ? "STOP" : 
                    command == 0x53 ? "PROGRAM" :
                    command == 0x12 ? "LIGHT_ON" :
                    command == 0x13 ? "LIGHT_OFF" : "OTHER"),
                   checksum);
          
          auto transmit = id(rf_transmitter).transmit();
          auto data = transmit.get_data();
          
          // AGC pulz
          data->mark(5300);
          data->space(530);
          
          // 64 dátových bitov
          for (int i = 63; i >= 0; i--) {
            if ((packet >> i) & 1) {
              // Bit 1: long HIGH, short LOW
              data->mark(565);
              data->space(270);
            } else {
              // Bit 0: short HIGH, long LOW
              data->mark(270);
              data->space(565);
            }
          }
          
          // Trailing bit (vždy 1)
          data->mark(565);
          data->space(270);
          
          // Radio silence
          data->space(5030);
          
          transmit.perform();
      - delay: 100ms  # Čas pre CC1101 prepnutie späť do RX
      - lambda: 'id(is_transmitting) = false;'

  # Dooya transmit skripty - simulujú správanie originálneho ovládača
  # Podľa debug logu: UP/DOWN posiela 3x check1 + 4x check2, STOP posiela 3x check
  - id: dooya_open
    parameters:
      channel: int
    then:
      - repeat:
          count: 3
          then:
            - remote_transmitter.transmit_dooya:
                transmitter_id: rf_transmitter
                id: 0x00BB6A83
                channel: !lambda 'return channel;'
                button: 1
                check: 1
      - repeat:
          count: 4
          then:
            - remote_transmitter.transmit_dooya:
                transmitter_id: rf_transmitter
                id: 0x00BB6A83
                channel: !lambda 'return channel;'
                button: 1
                check: 14

  - id: dooya_close
    parameters:
      channel: int
    then:
      - repeat:
          count: 3
          then:
            - remote_transmitter.transmit_dooya:
                transmitter_id: rf_transmitter
                id: 0x00BB6A83
                channel: !lambda 'return channel;'
                button: 3
                check: 3
      - repeat:
          count: 4
          then:
            - remote_transmitter.transmit_dooya:
                transmitter_id: rf_transmitter
                id: 0x00BB6A83
                channel: !lambda 'return channel;'
                button: 3
                check: 12

  - id: dooya_stop
    parameters:
      channel: int
    then:
      - repeat:
          count: 3
          then:
            - remote_transmitter.transmit_dooya:
                transmitter_id: rf_transmitter
                id: 0x00BB6A83
                channel: !lambda 'return channel;'
                button: 5
                check: 5

# --- Tlačidlá pre A-OK AC226-03 -------------------------
# A-OK AC114 protokol: 65 bitov, 433.92MHz
# Formát: [Start 8b=0xA3][ID 24b][Address 16b][Command 8b][Checksum 8b][1]
# Commands: UP=0x0B, DOWN=0x43, STOP=0x23, PROGRAM=0x53, LIGHT_OFF=0x13, LIGHT_ON=0x12
# Timing: AGC=5300µs HIGH + 530µs LOW, Bit0=270µs H + 565µs L, Bit1=565µs H + 270µs L
# --- Light pre A-OK pergolu -------------------------
light:
  - platform: binary
    name: "Pergola Svetlo"
    id: pergola_light
    output: pergola_light_output

output:
  - platform: template
    id: pergola_light_output
    type: binary
    write_action:
      - if:
          condition:
            lambda: 'return state;'
          then:
            - repeat:
                count: 3
                then:
                  - script.execute:
                      id: transmit_aok
                      cmd: 0x12   # LIGHT_ON
                      packet_id: 0xD3F5D3
                      channel: 9
                  - delay: 15ms
          else:
            - repeat:
                count: 3
                then:
                  - script.execute:
                      id: transmit_aok
                      cmd: 0x13   # LIGHT_OFF
                      packet_id: 0xD3F5D3
                      channel: 9
                  - delay: 15ms

  

### --- CC1101 Ovládacie prvky (voliteľné) ---------------------------
globals:
  - id: global_blind_duration
    type: float
    restore_value: yes
    initial_value: '45.0'
  
  - id: global_pergola_duration
    type: float
    restore_value: yes
    initial_value: '20.0'
    
  # A-OK konfigurácia - zachytené z vášho AC136-04 ovládača
  - id: aok_remote_id
    type: uint32_t
    restore_value: yes
    initial_value: '0xD3F5D3'  # ID z vášho ovládača AC136-04
    
  - id: aok_channel
    type: uint16_t
    restore_value: yes
    initial_value: '0x0100'  # Kanál 9 (bitové pole: 1<<8 = 0x0100 = 256)
  
  # Ochrana pred self-reception - ignoruj RX počas a krátko po TX
  - id: is_transmitting
    type: bool
    restore_value: no
    initial_value: 'false'
  
  # Debounce pre A-OK príkazy (timestamp posledného príkazu)
  - id: last_aok_command_time
    type: uint32_t
    restore_value: no
    initial_value: '0'
  
  - id: last_aok_command
    type: uint8_t
    restore_value: no
    initial_value: '0'

number:
  - platform: template
    name: "Doba chodu roliet"
    id: blind_duration_setting
    icon: "mdi:timer-outline"
    unit_of_measurement: "s"
    min_value: 5
    max_value: 120
    step: 1
    initial_value: 45
    restore_value: true
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda: 'id(global_blind_duration) = x;'
  
  - platform: template
    name: "Doba chodu pergoly"
    id: pergola_duration_setting
    icon: "mdi:timer-outline"
    unit_of_measurement: "s"
    min_value: 5
    max_value: 120
    step: 1
    initial_value: 20
    restore_value: true
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda: 'id(global_pergola_duration) = x;'

sensor:
  - platform: template
    id: cc1101_sensor_rssi
    name: "CC1101 RSSI"
    lambda: return id(mycc1101).getRSSI();
    update_interval: 10s
    unit_of_measurement: dB
  - platform: template
    id: cc1101_sensor_rx_rssi
    name: "CC1101 Posledný RX RSSI"
    lambda: return id(mycc1101).last_rx_rssi;
    update_interval: 10s
    unit_of_measurement: dB
