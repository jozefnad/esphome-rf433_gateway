esphome:
  name: pergola-controller
  friendly_name: Pergola Controller

  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(mycc1101).recv();

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

substitutions:
  cs:   "7"    # CC1101 CSN -> GPIO7
  clk:  "4"    # CC1101 SCK -> GPIO4
  mosi: "6"    # CC1101 MOSI -> GPIO6
  miso: "5"    # CC1101 MISO -> GPIO5
  rx:   "3"    # CC1101 GDO0 -> GPIO3 (shared RX/TX)
  tx:   "3"    # CC1101 GDO0 -> GPIO3 (shared RX/TX)
  tx_rx_shared: "true"

# --- Networking & basics -----------------------------------------------

# Zapne sledovanie Bluetooth zariadení
