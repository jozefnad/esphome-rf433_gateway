# --- HA Buttons pre Dooya TX cez CC1101 -----------------------------------
# POZNÁMKA: Musíte nahradiť ID hodnotami z vášho ovládača DC2702!
# Použite logger level: DEBUG a sledujte logy pri tlačení tlačidiel.

cover:
  # A-OK pergola strecha
  - platform: time_based
    name: "Pergola Strecha"
    id: pergola_roof
    has_built_in_endstop: true
    assumed_state: true
    open_action:
      - lambda: |-
          // Dynamicky prepíše čas trvania v milisekundách pred spustením
          auto duration = id(global_pergola_duration) * 1000;
          id(pergola_roof).set_open_duration(duration);
          id(pergola_roof).set_close_duration(duration);
      - script.execute:
          id: transmit_aok
          cmd: 0x0B           # UP
          packet_id: 0xD3F5D3 # Nahradiť vaším ID
          channel: 9          # Kanál 9 pre pergolu
    close_action:
      - lambda: |-
          // Dynamicky prepíše čas trvania v milisekundách pred spustením
          auto duration = id(global_pergola_duration) * 1000;
          id(pergola_roof).set_open_duration(duration);
          id(pergola_roof).set_close_duration(duration);
      - script.execute:
          id: transmit_aok
          cmd: 0x43           # DOWN
          packet_id: 0xD3F5D3 # Nahradiť vaším ID
          channel: 9
    stop_action:
      - script.execute:
          id: transmit_aok
          cmd: 0x23           # STOP
          packet_id: 0xD3F5D3 # Nahradiť vaším ID
          channel: 9
    open_duration: 20s
    close_duration: 20s 

  # Všetky rolety (kanál 0)
  - platform: time_based
    name: "Všetky Rolety"
    id: all_blinds
    has_built_in_endstop: true
    assumed_state: true
    open_action:
      - lambda: |-
          auto duration = id(global_blind_duration) * 1000;
          id(all_blinds).set_open_duration(duration);
          id(all_blinds).set_close_duration(duration);
      - script.execute:
          id: dooya_open
          channel: 0
      - cover.open: blind_1
      - cover.open: blind_2
      - cover.open: blind_3
    close_action:
      - lambda: |-
          auto duration = id(global_blind_duration) * 1000;
          id(all_blinds).set_open_duration(duration);
          id(all_blinds).set_close_duration(duration);
      - script.execute:
          id: dooya_close
          channel: 0
      - cover.close: blind_1
      - cover.close: blind_2
      - cover.close: blind_3
    stop_action:
      - script.execute:
          id: dooya_stop
          channel: 0
      - cover.stop: blind_1
      - cover.stop: blind_2
      - cover.stop: blind_3
    open_duration: 45s
    close_duration: 45s

  # Roleta 1 (kanál 1)
  - platform: time_based
    name: "Roleta 1"
    id: blind_1
    has_built_in_endstop: true
    assumed_state: true
    open_action:
