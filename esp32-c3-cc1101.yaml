    components: [radiolib_cc1101]

# SPI bus pre CC1101
spi:
  clk_pin: $clk
  mosi_pin: $mosi
  miso_pin: $miso

# --- Remote receiver na CC1101 GDO0 (shared RX/TX) ------------------------
remote_receiver:
  - id: rf_receiver
    idle: 7ms
    filter: 100us
    buffer_size: 4kb
    pin:
      number: $rx
      allow_other_uses: true
      mode:
        output: false
        input: true
        pullup: $tx_rx_shared
        open_drain: false
      id: cc1101_gdo0_recv

    dump:
      - dooya
      # - raw  # odkomentovať pre surové dáta
    
    # A-OK protokol dekodér (optimalizovaný)
    on_raw:
      then:
        - lambda: |-
            // Skorý návrat ak vysielame (self-reception protection)
            if (id(is_transmitting)) return;
            
            // A-OK: 65 bitov, potrebujeme min ~130 vzoriek
            const int n = x.size();
            if (n < 130) return;
            
            // Hľadaj AGC pulz (4500-6000µs HIGH)
            int idx = 0;
            while (idx < n && !(x[idx] > 4500 && x[idx] < 6000)) idx++;
            if (idx >= n - 130) return;
            
            idx++;  // skip AGC mark
            
            // AGC space check (-300 to -800µs)
            if (x[idx] > -300 || x[idx] < -800) return;
            idx++;
            
            // Dekóduj 64 bitov (trailing bit ignorujeme)
            uint64_t packet = 0;
            for (int bit = 0; bit < 64 && idx < n; bit++) {
              int mark = x[idx++];
              if (mark < 150 || mark > 900) return;  // neplatný pulz
              packet = (packet << 1) | (mark > 400 ? 1 : 0);
              if (idx < n && x[idx] < 0) idx++;  // skip space
            }
            
            // Kontrola start byte (0xA3)
            if (((packet >> 56) & 0xFF) != 0xA3) return;
            
            // Extrakcia polí
            uint32_t remote_id = (packet >> 32) & 0xFFFFFF;
            uint16_t address = (packet >> 16) & 0xFFFF;
            uint8_t command = (packet >> 8) & 0xFF;
            uint8_t checksum = packet & 0xFF;
            
            // Checksum validácia
            uint8_t calc = ((remote_id >> 16) + (remote_id >> 8) + remote_id) & 0xFF;
            calc += ((address >> 8) + address + command) & 0xFF;
            if (checksum != (calc & 0xFF)) return;  // zlý checksum - ignoruj
            
            // Debounce - rovnaký príkaz do 500ms
            uint32_t now = millis();
            if (command == id(last_aok_command) && (now - id(last_aok_command_time)) < 500) return;
            id(last_aok_command) = command;
            id(last_aok_command_time) = now;
            
            // Log (kanál ako číslo bitu +1)
            int ch = 0;
            for (int i = 0; i < 16; i++) if (address & (1 << i)) { ch = i + 1; break; }
            ESP_LOGI("A-OK", "ID=0x%06X CH=%d CMD=0x%02X", remote_id, ch, command);
            
            // Spracovanie príkazov (len naše ovládače)
            if (remote_id == 0xD3F5D3 || remote_id == 0xD3F611) {
              switch (command) {
                case 0x0B: id(aok_remote_up).publish_state(true); break;
                case 0x43: id(aok_remote_down).publish_state(true); break;
                case 0x23: id(aok_remote_stop).publish_state(true); break;
                case 0x12: id(pergola_light).remote_values.set_state(true); id(pergola_light).publish_state(); break;
                case 0x13: id(pergola_light).remote_values.set_state(false); id(pergola_light).publish_state(); break;
              }
            }

# --- Remote transmitter na CC1101 GDO0 (shared RX/TX) ---------------------

remote_transmitter:
  - id: rf_transmitter
    pin:
      number: $tx
      allow_other_uses: ${tx_rx_shared}
      mode:
        output: true
        input: true
        pullup: true
        open_drain: true
      id: cc1101_gdo0_xmit

    on_transmit:
      then:
        - lambda: |-
            id(mycc1101).xmit();   // prepnutie CC1101 do TX módu

    on_complete:
      then:
        - lambda: |-
            id(mycc1101).recv();   // prepnutie CC1101 do RX módu

    carrier_duty_percent: 100%

# --- RadioLib CC1101 konfigurácia -----------------------------------------

radiolib_cc1101:
  id: mycc1101
  cs_pin: $cs

  # použitie GDO0 ako RX pin pre RSSI/flags (rovnaký ako remote_receiver)
  rx_pin:
    number: $rx
    allow_other_uses: true

  # Dooya špecifická konfigurácia - nastaviteľné z HA
  frequency: 433.92mhz      # Dooya frekvencia
  filter: 540khz            # RX filter šírka pásma
  bitrate: 2.4               # kbps
  reg_agcctrl2: 0x43  # Zníženie citlivosti pre potlačenie šumu
  reg_agcctrl1: 0x40
  reg_agcctrl0: 0x91

